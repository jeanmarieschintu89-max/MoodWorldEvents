name: MoodCraftMeteo

version: 1.0

main: fr.moodcraft.meteo.Main

api-version: '1.21'

authors:
  - MoodCraft

description: Système climatique immersif MoodCraft

commands:

  meteo:
    description: Consulte la météo actuelle
    aliases:
      - météo
      - weather
    permission: moodcraft.meteo.use

  meteogui:
    description: Interface admin météo
    permission: moodcraft.meteo.admin
    aliases:
      - climatset
      - weatheradmin

  meteoadmin:
    description: Administration complète MoodCraftMeteo
    usage: /meteoadmin
    permission: moodcraft.meteo.admin
    aliases:
      - madminmeteo
      - meteoctl

  soleil:
    description: Active le soleil
    permission: moodcraft.meteo.admin
    aliases:
      - clear

  pluie:
    description: Active la pluie
    permission: moodcraft.meteo.admin
    aliases:
      - rain

  tempete:
    description: Active une tempête
    permission: moodcraft.meteo.admin
    aliases:
      - orage
      - storm
      - thunder

  neige:
    description: Active la neige
    permission: moodcraft.meteo.admin
    aliases:
      - snow

  blizzard:
    description: Active un blizzard
    permission: moodcraft.meteo.admin

  brouillard:
    description: Active le brouillard
    permission: moodcraft.meteo.admin
    aliases:
      - fog

  canicule:
    description: Active une canicule
    permission: moodcraft.meteo.admin
    aliases:
      - heatwave

  jour:
    permission: moodcraft.meteo.admin
    aliases:
      - day

  matin:
    permission: moodcraft.meteo.admin
    aliases:
      - morning

  midi:
    permission: moodcraft.meteo.admin
    aliases:
      - noon

  soir:
    permission: moodcraft.meteo.admin
    aliases:
      - evening

  nuit:
    permission: moodcraft.meteo.admin
    aliases:
      - night

  minuit:
    permission: moodcraft.meteo.admin
    aliases:
      - midnight

  aube:
    permission: moodcraft.meteo.admin
    aliases:
      - sunrise

  crepuscule:
    permission: moodcraft.meteo.admin
    aliases:
      - sunset
      - dusk

  saison:
    description: Gestion des saisons
    permission: moodcraft.meteo.admin
    aliases:
      - season

  climat:
    description: Informations climatiques
    permission: moodcraft.meteo.admin
    aliases:
      - climate

  temperature:
    description: Voir la température
    aliases:
      - temp
      - thermo

  forecast:
    description: Prévisions météo
    aliases:
      - prevision
      - meteoavenir

  aurore:
    description: Déclenche une aurore boréale
    permission: moodcraft.meteo.admin
    aliases:
      - aurora

  eclipse:
    description: Déclenche une éclipse
    permission: moodcraft.meteo.admin
    aliases:
      - lunar

  supercellule:
    description: Déclenche une supercellule
    permission: moodcraft.meteo.admin
    aliases:
      - superstorm

  tempetesable:
    description: Déclenche une tempête de sable
    permission: moodcraft.meteo.admin
    aliases:
      - sandstorm

permissions:

  moodcraft.meteo.use:
    description: Consulter la météo
    default: true

  moodcraft.meteo.admin:
    description: Accès administration météo
    default: op